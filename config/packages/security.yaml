security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # 1. ON CHANGE LE PROVIDER : On dit à Symfony de chercher dans l'entité Admin
    providers:
        app_admin_provider:
            entity:
                class: App\Entity\Admin
                property: username # (Change par 'email' si ton entité utilise un email pour se connecter)

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            # 2. ON UTILISE LE BON PROVIDER
            provider: app_admin_provider

            # 3. ON ACTIVE LA CONNEXION JSON POUR REACT
            json_login:
                check_path: api_login
                username_path: username
                password_path: password

            logout:
                path: api_logout

    # Note: Only the *first* matching rule is applied
    access_control:
        # On garde ça commenté pour le moment, on bloquera les routes API plus tard
        # - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/profile, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
